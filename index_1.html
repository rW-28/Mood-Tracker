<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tracker</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="container">
        <form id="form">

            <label for="date">enter date</label>
            <input type="date" id="date" required>
    
            <label for="scale">enter mood level from -5 to 5</label>
            <input type="number" min= "-5" max= "5" id="scale" required>
    
            <label for="note">enter note</label>
            <input type="text" id="note" required>

            <label for="anxiety">enter anxiety level from 0 to 5</label>
            <input type="number" id="anxiety" required>
    
            <button type="submit">save</button>
            
        </form>
    </main>
    <script src="./index_1.js"></script>
</body>
</html>
